name: Check documentation synchronization

on:
  pull_request:

permissions:
  contents: read

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify bilingual README updates
        run: python3 scripts/check_docs_sync.py --base-ref "${{ github.event.pull_request.base.sha }}"
